<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>Mizuki-Qt</title>
    <style>
      :root {
        color-scheme: light dark;
        --text: #344156;
        --muted: #687386;
        --panel: rgba(255, 255, 255, 0.72);
        --panel-border: rgba(255, 255, 255, 0.72);
        --accent: #86b9ff;
        --accent-2: #ffb4cf;
        --accent-3: #b9dfc6;
        --shadow: rgba(57, 72, 98, 0.18);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text: #eff5ff;
          --muted: #c4cfdd;
          --panel: rgba(16, 24, 36, 0.62);
          --panel-border: rgba(255, 255, 255, 0.14);
          --shadow: rgba(0, 0, 0, 0.38);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family: "Zen Maru Gothic", "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
        background: #eef5fb;
      }

      body {
        min-width: 320px;
      }

      #screen {
        width: 100%;
        height: 100%;
        display: none;
      }

      #qtspinner {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        margin: 0;
        overflow: hidden;
        color: var(--text);
        background: linear-gradient(135deg, #f1c8da 0%, #f5cab1 48%, #baf1f5 100%);
      }

      #qtspinner::before {
        content: "";
        position: absolute;
        inset: -24%;
        background:
          radial-gradient(circle at 18% 24%, rgba(88, 164, 255, 0.78), transparent 34%),
          radial-gradient(circle at 78% 18%, rgba(255, 128, 184, 0.72), transparent 32%),
          radial-gradient(circle at 62% 82%, rgba(129, 219, 161, 0.68), transparent 36%),
          radial-gradient(circle at 24% 76%, rgba(255, 204, 112, 0.58), transparent 34%);
        background-size: 145% 145%, 138% 138%, 150% 150%, 132% 132%;
        filter: blur(42px) saturate(1.22);
        opacity: 0.95;
        transform-origin: center;
        animation: colorField 16s ease-in-out infinite alternate;
      }

      #qtspinner::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.001);
        backdrop-filter: blur(30px) saturate(1.26);
      }

      .loader-shell {
        position: relative;
        z-index: 1;
        width: min(32rem, calc(100vw - 2rem));
        padding: 2rem;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        box-shadow: 0 24px 80px var(--shadow);
        backdrop-filter: blur(22px) saturate(1.15);
        animation: rise 700ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
      }

      .loader-mark {
        position: relative;
        width: 6.5rem;
        height: 6.5rem;
        margin: 0 auto 1.35rem;
      }

      .loader-mark::before,
      .loader-mark::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 38% 62% 46% 54% / 48% 42% 58% 52%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2) 52%, var(--accent-3));
        box-shadow: 0 16px 42px rgba(80, 116, 160, 0.2);
        animation: petal 4.8s ease-in-out infinite;
      }

      .loader-mark::after {
        inset: 1rem;
        background:
          radial-gradient(circle at 38% 36%, rgba(255, 255, 255, 0.95) 0 8%, transparent 9%),
          radial-gradient(circle at 62% 36%, rgba(255, 255, 255, 0.95) 0 8%, transparent 9%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.12));
        border: 1px solid rgba(255, 255, 255, 0.56);
        animation: breathe 2.2s ease-in-out infinite;
      }

      .loader-title {
        margin: 0;
        font-size: clamp(2rem, 7vw, 3.75rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 2px 18px rgba(255, 255, 255, 0.58);
      }

      .loader-meta {
        margin: 0.7rem 0 1.25rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--muted);
      }

      .loader-bar {
        position: relative;
        width: 100%;
        height: 0.55rem;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.48);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 999px;
      }

      .loader-bar::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 -40%;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
        animation: loading 1.45s ease-in-out infinite;
      }

      #qtstatus {
        min-height: 1.35rem;
        margin-top: 1rem;
        font-size: 0.95rem;
        line-height: 1.45;
        color: var(--muted);
        word-break: break-word;
      }

      #qtstatus.is-error {
        --error-bg: rgba(255, 231, 238, 0.72);
        max-height: 11rem;
        overflow: auto;
        padding: 0.75rem 0.85rem;
        color: #7f263b;
        text-align: left;
        white-space: pre-wrap;
        background: var(--error-bg);
        border: 1px solid rgba(255, 145, 174, 0.36);
        border-radius: 12px;
        background-clip: padding-box;
        clip-path: inset(0 round 12px);
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      #qtstatus.is-error::-webkit-scrollbar {
        display: none;
      }

      .status-actions {
        display: none;
        justify-content: flex-end;
        margin-top: 0.75rem;
      }

      .status-actions.is-visible {
        display: flex;
      }

      .copy-error-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.25rem;
        padding: 0 0.95rem;
        color: #6b3652;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.56);
        border: 1px solid rgba(255, 180, 207, 0.44);
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(107, 54, 82, 0.1);
        transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .copy-error-button:hover {
        background: rgba(255, 244, 248, 0.8);
        box-shadow: 0 10px 30px rgba(107, 54, 82, 0.14);
        transform: translateY(-1px);
      }

      .copy-error-button:active {
        transform: translateY(0);
      }

      .copy-error-button:focus-visible {
        outline: 2px solid rgba(134, 185, 255, 0.78);
        outline-offset: 3px;
      }

      noscript {
        display: block;
        margin-top: 1rem;
        color: #7f263b;
      }

      @keyframes loading {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(335%);
        }
      }

      @keyframes petal {
        0%,
        100% {
          transform: rotate(0deg) scale(1);
          border-radius: 38% 62% 46% 54% / 48% 42% 58% 52%;
        }

        50% {
          transform: rotate(8deg) scale(1.04);
          border-radius: 58% 42% 56% 44% / 46% 56% 44% 54%;
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.86;
        }

        50% {
          transform: scale(0.9);
          opacity: 1;
        }
      }

      @keyframes colorField {
        0%,
        100% {
          background-position: 0% 50%, 12% 38%, 85% 80%, 20% 82%;
          transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1.02);
        }

        50% {
          background-position: 100% 45%, 82% 62%, 18% 16%, 78% 24%;
          transform: translate3d(2%, 1%, 0) rotate(5deg) scale(1.08);
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(1rem) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 480px) {
        .loader-shell {
          padding: 1.5rem;
          border-radius: 18px;
        }

        .loader-mark {
          width: 5.2rem;
          height: 5.2rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body onload="init()">
    <figure id="qtspinner" aria-live="polite">
      <section class="loader-shell" aria-label="Qt WebAssembly loading">
        <div class="loader-mark" aria-hidden="true"></div>
        <h1 class="loader-title">Mizuki-Qt</h1>
        <p class="loader-meta">Qt for WebAssembly · GithubPage</p>
        <div class="loader-bar" aria-hidden="true"></div>
        <div id="qtstatus" role="status"></div>
        <div class="status-actions" id="statusActions">
          <button class="copy-error-button" id="copyErrorButton" type="button">复制错误信息</button>
        </div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </section>
    </figure>
    <div id="screen"></div>
    <!-- OpenCV.js 已弃用，保留以备恢复 -->
    <!-- <script src="js/opencv.js" type="text/javascript"></script> -->
    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');
            const statusActions = document.querySelector('#statusActions');
            const copyErrorButton = document.querySelector('#copyErrorButton');
            let lastErrorMessage = '';

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'static';
                ui.style.display = ui === spinner ? 'grid' : 'block';
            }

            const setStatus = (message, isError = false) => {
                status.textContent = message;
                status.classList.toggle('is-error', isError);
                statusActions.classList.toggle('is-visible', isError);
                lastErrorMessage = isError ? message : '';
                copyErrorButton.textContent = '复制错误信息';
                copyErrorButton.disabled = !isError;
            }

            const copyText = async text => {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    return;
                }

                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
            }

            copyErrorButton.addEventListener('click', async () => {
                if (!lastErrorMessage)
                    return;

                try {
                    await copyText(lastErrorMessage);
                    copyErrorButton.textContent = '已复制';
                } catch (copyError) {
                    console.error(copyError);
                    copyErrorButton.textContent = '复制失败';
                }
            });

            try {
                showUi(spinner);
                setStatus('正在加载 Qt WebAssembly...');

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => {
                            setStatus('加载完成');
                            showUi(screen);
                        },
                        onExit: exitData =>
                        {
                            let exitMessage = 'Qt WebAssembly 已退出';
                            exitMessage +=
                                exitData.code !== undefined ? `，退出码：${exitData.code}` : '';
                            exitMessage +=
                                exitData.text !== undefined ? `\n${exitData.text}` : '';
                            setStatus(exitMessage, exitData.code !== 0);
                            showUi(spinner);
                        },
                        entryFunction: window.GithubPage_entry,
                        containerElements: [screen],
                        
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
                const message = e && e.stack ? e.stack : String(e);
                setStatus(`Qt WebAssembly 加载失败\n${message}`, true);
                showUi(spinner);
            }
        }
    </script>
    <script src="GithubPage.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>
